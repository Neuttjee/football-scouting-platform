name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    env:
      # Dummy value so Prisma can load the schema in CI.
      # validate/get-config only require the variable to exist; they don't connect.
      DATABASE_URL: postgresql://user:password@localhost:5432/db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Prisma validate
        run: npx prisma validate

